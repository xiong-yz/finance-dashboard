<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人財務儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

  .lock-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f0; }
  .lock-card { background: #fff; border-radius: 16px; border: 1px solid #ebebeb; padding: 40px 36px; width: 320px; text-align: center; }
  .lock-card .icon { font-size: 36px; margin-bottom: 16px; }
  .lock-card h2 { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  .lock-card p { font-size: 13px; color: #888; margin-bottom: 24px; }
  .lock-card input { width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; text-align: center; letter-spacing: 0.1em; outline: none; margin-bottom: 12px; }
  .lock-card input:focus { border-color: #888; }
  .lock-card button { width: 100%; padding: 10px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .lock-card button:active { opacity: 0.85; }
  .lock-card .error { font-size: 12px; color: #d85a30; margin-top: 8px; display: none; }
  
  .header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 18px; font-weight: 500; }
  .header .last-updated { font-size: 12px; color: #888; }
  
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 12px; }
  .spinner { width: 32px; height: 32px; border: 2px solid #e5e5e5; border-top-color: #333; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 14px; color: #888; }
  
  .error-state { text-align: center; padding: 60px 20px; }
  .error-state p { color: #888; font-size: 14px; margin-top: 8px; }

  .content { padding: 20px; max-width: 900px; margin: 0 auto; display: none; }
  
  .section-title { font-size: 13px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; margin-top: 28px; }
  .section-title:first-child { margin-top: 0; }

  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 4px; }
  .metric-card { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #ebebeb; }
  .metric-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .metric-card .value { font-size: 20px; font-weight: 500; }
  .metric-card .sub { font-size: 11px; color: #aaa; margin-top: 4px; }
  .positive { color: #1d9e75; }
  .negative { color: #d85a30; }
  .neutral { color: #1a1a1a; }

  .chart-card { background: #fff; border-radius: 12px; border: 1px solid #ebebeb; padding: 20px; margin-bottom: 12px; }
  .chart-card h3 { font-size: 14px; font-weight: 500; margin-bottom: 16px; color: #444; }

  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .chart-row { grid-template-columns: 1fr; } }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .table-card { background: #fff; border-radius: 12px; border: 1px solid #ebebeb; overflow: hidden; margin-bottom: 12px; }
  .table-card h3 { font-size: 14px; font-weight: 500; padding: 16px 20px 12px; color: #444; border-bottom: 1px solid #f0f0f0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 20px; font-size: 11px; color: #aaa; font-weight: 500; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
  td { padding: 11px 20px; border-bottom: 1px solid #f5f5f5; color: #333; }
  tr:last-child td { border-bottom: none; }
  .text-right { text-align: right; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .badge-blue { background: #e6f1fb; color: #185fa5; }
  .badge-green { background: #eaf3de; color: #3b6d11; }
  .badge-amber { background: #faeeda; color: #854f0b; }
  .badge-coral { background: #faece7; color: #993c1d; }

  .month-selector { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .month-selector select { padding: 6px 10px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer; }
  .month-selector label { font-size: 13px; color: #666; }

  .no-data { text-align: center; padding: 40px; color: #bbb; font-size: 13px; }
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-card">
    <div class="icon">🔒</div>
    <h2>財務儀表板</h2>
    <p>請輸入密碼</p>
    <input type="password" id="pwInput" placeholder="••••••••" autofocus />
    <button onclick="checkPassword()">進入</button>
    <div class="error" id="pwError">密碼錯誤，請再試一次</div>
  </div>
</div>

<div id="dashboardWrap" style="display:none">
<div class="header">
  <h1>💰 財務儀表板</h1>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="last-updated" id="lastUpdated">載入中...</span>
    <a href="institutions.html" style="font-size:13px;color:#555;text-decoration:none;padding:6px 12px;border:1px solid #e0e0e0;border-radius:6px;background:#fff">🏦 機構管理</a>
  </div>
</div>

<div class="loading" id="loadingState">
  <div class="spinner"></div>
  <p>從 Google Sheets 讀取資料中...</p>
</div>

<div class="error-state" id="errorState" style="display:none">
  <p style="font-size:16px">⚠️ 無法載入資料</p>
  <p>請確認 Google Sheets 已設為「任何知道連結的人都可以檢視」</p>
</div>

<div class="content" id="mainContent">

  <div class="section-title">總覽</div>
  <div class="metric-grid" id="metricGrid"></div>

  <div class="section-title">資產趨勢</div>
  <div class="chart-card">
    <h3>每月淨資產 & 各項目</h3>
    <div class="legend" id="assetLegend"></div>
    <div style="position:relative;height:260px"><canvas id="assetChart" role="img" aria-label="每月資產趨勢圖"></canvas></div>
  </div>

  <div class="section-title">收支分析</div>
  <div class="month-selector">
    <label>月份</label>
    <select id="monthSelect"></select>
  </div>
  <div class="chart-row">
    <div class="chart-card">
      <h3>支出分類</h3>
      <div class="legend" id="catLegend"></div>
      <div style="position:relative;height:220px"><canvas id="catChart" role="img" aria-label="支出分類圓餅圖"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>每月支出趨勢</h3>
      <div style="position:relative;height:220px"><canvas id="spendChart" role="img" aria-label="每月支出趨勢折線圖"></canvas></div>
    </div>
  </div>

  <div class="section-title">投資明細</div>
  <div class="table-card">
    <h3>投資庫存快照</h3>
    <div style="overflow-x:auto">
      <table id="investTable">
        <thead><tr><th>標的</th><th>類型</th><th class="text-right">現值 (TWD)</th><th class="text-right">損益</th><th class="text-right">報酬率</th></tr></thead>
        <tbody id="investBody"></tbody>
      </table>
    </div>
  </div>

  <div class="section-title">貸款明細</div>
  <div class="table-card">
    <h3>貸款快照</h3>
    <div style="overflow-x:auto">
      <table id="loanTable">
        <thead><tr><th>銀行</th><th>類型</th><th class="text-right">現貸餘額</th><th class="text-right">本月還款</th><th class="text-right">利率</th></tr></thead>
        <tbody id="loanBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const SHEET_ID = '1-_xWxMsiCgpeNe_82anV4GFgW8SHt--Rwljeu7N5nfk';
const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;

const COLORS = {
  deposit: '#378ADD',
  invest:  '#1D9E75',
  ccDebt:  '#D85A30',
  loan:    '#D4537E',
  net:     '#534AB7',
};

const CAT_COLORS = ['#378ADD','#1D9E75','#D85A30','#534AB7','#D4537E','#BA7517','#639922','#A32D2D','#185FA5','#0F6E56'];

function fmt(n, digits=0) {
  if (n == null || isNaN(n)) return '-';
  return new Intl.NumberFormat('zh-TW', { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(n);
}
function fmtSign(n) {
  if (n == null || isNaN(n)) return '-';
  const s = fmt(Math.abs(n));
  return (n >= 0 ? '+' : '-') + s;
}

async function fetchSheet(name) {
  const url = BASE + encodeURIComponent(name);
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const cols = json.table.cols.map(c => c.label);
  const rows = (json.table.rows || []).map(r =>
    Object.fromEntries(cols.map((c, i) => [c, r.c[i]?.v ?? null]))
  );
  return rows;
}

let catChartInst = null;

async function init() {
  try {
    const [overview, txns, invest, loans] = await Promise.all([
      fetchSheet('月度總覽'),
      fetchSheet('信用卡交易明細'),
      fetchSheet('投資庫存快照'),
      fetchSheet('貸款快照'),
    ]);

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';

    const latest = overview[overview.length - 1] || {};
    document.getElementById('lastUpdated').textContent = `最後更新：${latest['年月'] || '-'}`;

    renderMetrics(latest);
    renderAssetChart(overview);
    renderSpendTrend(txns);
    renderMonthFilter(txns);
    renderInvestTable(invest);
    renderLoanTable(loans);

  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    console.error(e);
  }
}

function renderMetrics(d) {
  const net = d['淨資產'] || 0;
  const dep = d['存款總額(TWD)'] || 0;
  const inv = d['投資現值總額'] || 0;
  const cc  = d['信用卡應繳總額'] || 0;
  const loan= d['貸款餘額總額'] || 0;

  const items = [
    { label: '淨資產', value: fmt(net), cls: net >= 0 ? 'positive' : 'negative', sub: d['年月'] },
    { label: '存款', value: fmt(dep), cls: 'neutral', sub: 'TWD' },
    { label: '投資現值', value: fmt(inv), cls: 'positive', sub: 'TWD' },
    { label: '信用卡應繳', value: fmt(cc), cls: cc > 0 ? 'negative' : 'neutral', sub: '待繳' },
    { label: '貸款餘額', value: fmt(loan), cls: 'negative', sub: '剩餘' },
  ];

  document.getElementById('metricGrid').innerHTML = items.map(i => `
    <div class="metric-card">
      <div class="label">${i.label}</div>
      <div class="value ${i.cls}">${i.value}</div>
      <div class="sub">${i.sub || ''}</div>
    </div>
  `).join('');
}

function renderAssetChart(rows) {
  const labels = rows.map(r => r['年月']);
  const deps   = rows.map(r => r['存款總額(TWD)'] || 0);
  const invs   = rows.map(r => r['投資現值總額'] || 0);
  const ccs    = rows.map(r => -(r['信用卡應繳總額'] || 0));
  const loans  = rows.map(r => -(r['貸款餘額總額'] || 0));
  const nets   = rows.map(r => r['淨資產'] || 0);

  const legend = [
    { color: COLORS.deposit, label: '存款' },
    { color: COLORS.invest,  label: '投資' },
    { color: COLORS.ccDebt,  label: '信用卡(負)' },
    { color: COLORS.loan,    label: '貸款(負)' },
    { color: COLORS.net,     label: '淨資產' },
  ];
  document.getElementById('assetLegend').innerHTML = legend.map(l =>
    `<span class="legend-item"><span class="legend-dot" style="background:${l.color}"></span>${l.label}</span>`
  ).join('');

  new Chart(document.getElementById('assetChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '存款', data: deps, backgroundColor: COLORS.deposit + 'cc', stack: 'a' },
        { label: '投資', data: invs, backgroundColor: COLORS.invest + 'cc', stack: 'a' },
        { label: '信用卡(負)', data: ccs, backgroundColor: COLORS.ccDebt + 'cc', stack: 'a' },
        { label: '貸款(負)', data: loans, backgroundColor: COLORS.loan + 'cc', stack: 'a' },
        { label: '淨資產', data: nets, type: 'line', borderColor: COLORS.net, backgroundColor: 'transparent', borderWidth: 2, pointRadius: 4, pointBackgroundColor: COLORS.net, tension: 0.3 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { stacked: true, ticks: { autoSkip: false, maxRotation: 45, font: { size: 11 } } },
        y: { stacked: true, ticks: { callback: v => fmt(v), font: { size: 11 } }, grid: { color: '#f0f0f0' } }
      }
    }
  });
}

function renderSpendTrend(txns) {
  const byMonth = {};
  txns.forEach(r => {
    const ym = (r['來源帳單'] || '').substring(0, 7);
    const amt = r['金額'] || 0;
    if (!ym || amt >= 0) return;
    const cat = r['分類'] || '';
    if (cat === '轉帳') return;  // 排除轉帳
    byMonth[ym] = (byMonth[ym] || 0) + Math.abs(amt);
  });
  const months = Object.keys(byMonth).sort();
  const vals = months.map(m => Math.round(byMonth[m]));

  new Chart(document.getElementById('spendChart'), {
    type: 'line',
    data: {
      labels: months,
      datasets: [{ label: '支出', data: vals, borderColor: '#D85A30', backgroundColor: '#D85A3015', fill: true, tension: 0.3, pointRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { autoSkip: true, maxRotation: 45, font: { size: 10 } } },
        y: { ticks: { callback: v => fmt(v), font: { size: 10 } }, grid: { color: '#f0f0f0' } }
      }
    }
  });
}

function renderMonthFilter(txns) {
  const months = [...new Set(txns.map(r => (r['來源帳單'] || '').substring(0, 7)).filter(Boolean))].sort().reverse();
  const sel = document.getElementById('monthSelect');
  sel.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
  sel.addEventListener('change', () => renderCatChart(txns, sel.value));
  if (months.length) renderCatChart(txns, months[0]);
}

function renderCatChart(txns, month) {
  const byCat = {};
  txns.forEach(r => {
    const ym = (r['來源帳單'] || '').substring(0, 7);
    if (ym !== month) return;
    const amt = r['金額'] || 0;
    if (amt >= 0) return;
    const cat = r['分類'] || '其他';
    if (cat === '轉帳') return;  // 排除轉帳
    byCat[cat] = (byCat[cat] || 0) + Math.abs(amt);
  });

  const cats = Object.keys(byCat).sort((a, b) => byCat[b] - byCat[a]);
  const vals = cats.map(c => Math.round(byCat[c]));
  const total = vals.reduce((s, v) => s + v, 0);
  const colors = cats.map((_, i) => CAT_COLORS[i % CAT_COLORS.length]);

  document.getElementById('catLegend').innerHTML = cats.map((c, i) =>
    `<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${c} ${Math.round(byCat[c]/total*100)}%</span>`
  ).join('');

  if (catChartInst) catChartInst.destroy();
  catChartInst = new Chart(document.getElementById('catChart'), {
    type: 'doughnut',
    data: { labels: cats, datasets: [{ data: vals, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${fmt(ctx.raw)} (${Math.round(ctx.raw/total*100)}%)` } }
      }
    }
  });
}

function renderInvestTable(rows) {
  const latest = {};
  rows.forEach(r => {
    const key = r['個股投資標的'] || r['投資類型'] || '-';
    const ym = r['年月'] || '';
    if (!latest[key] || ym > latest[key]['年月']) latest[key] = r;
  });

  const body = document.getElementById('investBody');
  const items = Object.values(latest).sort((a, b) => (b['投資現值'] || 0) - (a['投資現值'] || 0));
  if (!items.length) { body.innerHTML = '<tr><td colspan="5" class="no-data">尚無資料</td></tr>'; return; }

  body.innerHTML = items.map(r => {
    const pnl = r['損益_含息'] || r['損益_不含息'] || 0;
    const rate = r['報酬率_含息'] || r['報酬率_不含息'] || 0;
    const typeColor = r['投資類型'] === '台股' ? 'badge-green' : r['投資類型'] === '美股' ? 'badge-blue' : 'badge-amber';
    return `<tr>
      <td>${r['個股投資標的'] || '-'}</td>
      <td><span class="badge ${typeColor}">${r['投資類型'] || '-'}</span></td>
      <td class="text-right">${fmt(r['投資現值'])}</td>
      <td class="text-right ${pnl >= 0 ? 'positive' : 'negative'}">${fmtSign(pnl)}</td>
      <td class="text-right ${rate >= 0 ? 'positive' : 'negative'}">${rate != null ? (rate * 100).toFixed(1) + '%' : '-'}</td>
    </tr>`;
  }).join('');
}

function renderLoanTable(rows) {
  const body = document.getElementById('loanBody');
  const latest = {};
  rows.forEach(r => {
    const key = (r['銀行'] || '') + (r['帳戶末四碼'] || '');
    const ym = r['年月'] || '';
    if (!latest[key] || ym > latest[key]['年月']) latest[key] = r;
  });
  const items = Object.values(latest).sort((a, b) => (b['現貸餘額'] || 0) - (a['現貸餘額'] || 0));
  if (!items.length) { body.innerHTML = '<tr><td colspan="5" class="no-data">尚無資料</td></tr>'; return; }

  body.innerHTML = items.map(r => `<tr>
    <td>${r['銀行'] || '-'}</td>
    <td>${r['貸款類型'] || '-'}</td>
    <td class="text-right negative">${fmt(r['現貸餘額'])}</td>
    <td class="text-right">${fmt(r['本期應還/本月還款'])}</td>
    <td class="text-right">${r['利率'] != null ? (r['利率'] * 100).toFixed(2) + '%' : '-'}</td>
  </tr>`).join('');
}

const PASSWORD_HASH = '4f85fa5b2e2dc89685fa50e10edaf3d0d578ea98e316cbf9b73364c5472c85b9';

async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword() {
  const pw = document.getElementById('pwInput').value;
  const hash = await hashPassword(pw);
  if (hash === PASSWORD_HASH) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('dashboardWrap').style.display = 'block';
    sessionStorage.setItem('auth', hash);
    init();
  } else {
    document.getElementById('pwError').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

(async () => {
  const saved = sessionStorage.getItem('auth');
  if (saved && saved === PASSWORD_HASH) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('dashboardWrap').style.display = 'block';
    init();
  }
})();
</script>
</div>
</body>
</html>
