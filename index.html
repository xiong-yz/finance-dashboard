<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人財務儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

  .lock-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f0; }
  .lock-card { background: #fff; border-radius: 16px; border: 1px solid #ebebeb; padding: 40px 36px; width: 320px; text-align: center; }
  .lock-card .icon { font-size: 36px; margin-bottom: 16px; }
  .lock-card h2 { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  .lock-card p { font-size: 13px; color: #888; margin-bottom: 24px; }
  .lock-card input { width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; text-align: center; letter-spacing: 0.1em; outline: none; margin-bottom: 12px; }
  .lock-card input:focus { border-color: #888; }
  .lock-card button { width: 100%; padding: 10px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .lock-card button:active { opacity: 0.85; }
  .lock-card .error { font-size: 12px; color: #d85a30; margin-top: 8px; display: none; }
  
  .header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 18px; font-weight: 500; }
  .header .last-updated { font-size: 12px; color: #888; }
  
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 12px; }
  .spinner { width: 32px; height: 32px; border: 2px solid #e5e5e5; border-top-color: #333; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 14px; color: #888; }
  
  .error-state { text-align: center; padding: 60px 20px; }
  .error-state p { color: #888; font-size: 14px; margin-top: 8px; }

  .content { padding: 20px; max-width: 900px; margin: 0 auto; display: none; }
  
  .section-title { font-size: 13px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; margin-top: 28px; }
  .section-title:first-child { margin-top: 0; }

  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 4px; }
  .metric-card { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #ebebeb; }
  .metric-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .metric-card .value { font-size: 20px; font-weight: 500; }
  .metric-card .sub { font-size: 11px; color: #aaa; margin-top: 4px; }
  .positive { color: #1d9e75; }
  .negative { color: #d85a30; }
  .neutral { color: #1a1a1a; }

  .chart-card { background: #fff; border-radius: 12px; border: 1px solid #ebebeb; padding: 20px; margin-bottom: 12px; }
  .chart-card h3 { font-size: 14px; font-weight: 500; margin-bottom: 16px; color: #444; }

  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .chart-row { grid-template-columns: 1fr; } }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .table-card { background: #fff; border-radius: 12px; border: 1px solid #ebebeb; overflow: hidden; margin-bottom: 12px; }
  .table-card h3 { font-size: 14px; font-weight: 500; padding: 16px 20px 12px; color: #444; border-bottom: 1px solid #f0f0f0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 20px; font-size: 11px; color: #aaa; font-weight: 500; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
  td { padding: 11px 20px; border-bottom: 1px solid #f5f5f5; color: #333; }
  tr:last-child td { border-bottom: none; }
  .text-right { text-align: right; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .badge-blue { background: #e6f1fb; color: #185fa5; }
  .badge-green { background: #eaf3de; color: #3b6d11; }
  .badge-amber { background: #faeeda; color: #854f0b; }
  .badge-coral { background: #faece7; color: #993c1d; }

  .month-selector { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .month-selector select { padding: 6px 10px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer; }
  .month-selector label { font-size: 13px; color: #666; }

  .no-data { text-align: center; padding: 40px; color: #bbb; font-size: 13px; }


  /* 交易明細表格 */
  .tx-filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
  .tx-filter-row select { padding: 6px 10px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer; }
  .tx-filter-row input { padding: 6px 10px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 13px; width: 160px; outline: none; }
  .tx-filter-row input:focus { border-color: #888; }
  tr.clickable:hover { background: #f9f9f7; cursor: pointer; }
  .cat-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #f0f0f0; color: #555; }
  .tx-pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-top: 1px solid #f0f0f0; font-size: 12px; color: #888; }
  .tx-pagination button { padding: 4px 12px; border: 1px solid #e0e0e0; border-radius: 5px; background: #fff; font-size: 12px; cursor: pointer; }
  .tx-pagination button:disabled { opacity: 0.4; cursor: default; }

  /* 編輯視窗 */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 24px; width: 360px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
  .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 18px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
  .modal-field input, .modal-field select { width: 100%; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 7px; font-size: 14px; outline: none; }
  .modal-field input:focus, .modal-field select:focus { border-color: #888; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .modal-actions button { flex: 1; padding: 9px; border-radius: 7px; font-size: 14px; cursor: pointer; border: none; }
  .btn-cancel { background: #f5f5f0; color: #555; }
  .btn-save { background: #1a1a1a; color: #fff; }
  .btn-save:disabled { opacity: 0.5; cursor: default; }
  .modal-msg { font-size: 12px; margin-top: 10px; text-align: center; }
  .modal-msg.success { color: #1d9e75; }
  .modal-msg.error { color: #d85a30; }</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-card">
    <div class="icon">🔒</div>
    <h2>財務儀表板</h2>
    <p>請輸入密碼</p>
    <input type="password" id="pwInput" placeholder="••••••••" autofocus />
    <button onclick="checkPassword()">進入</button>
    <div class="error" id="pwError">密碼錯誤，請再試一次</div>
  </div>
</div>

<div id="dashboardWrap" style="display:none">
<div class="header">
  <h1>💰 財務儀表板</h1>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="last-updated" id="lastUpdated">載入中...</span>
    <a href="institutions.html" style="font-size:13px;color:#555;text-decoration:none;padding:6px 12px;border:1px solid #e0e0e0;border-radius:6px;background:#fff">🏦 機構管理</a>
  </div>
</div>

<div class="loading" id="loadingState">
  <div class="spinner"></div>
  <p>從 Google Sheets 讀取資料中...</p>
</div>

<div class="error-state" id="errorState" style="display:none">
  <p style="font-size:16px">⚠️ 無法載入資料</p>
  <p>請確認 Google Sheets 已設為「任何知道連結的人都可以檢視」</p>
</div>

<div class="content" id="mainContent">

  <div class="section-title">總覽</div>
  <div class="metric-grid" id="metricGrid"></div>

  <div class="section-title">資產趨勢</div>
  <div class="chart-card">
    <h3>每月淨資產 & 各項目</h3>
    <div class="legend" id="assetLegend"></div>
    <div style="position:relative;height:260px"><canvas id="assetChart" role="img" aria-label="每月資產趨勢圖"></canvas></div>
  </div>

  <div class="section-title">收支分析</div>
  <div class="month-selector">
    <label>月份</label>
    <select id="monthSelect"></select>
  </div>
  <div class="chart-row">
    <div class="chart-card">
      <h3>支出分類</h3>
      <div class="legend" id="catLegend"></div>
      <div style="position:relative;height:220px"><canvas id="catChart" role="img" aria-label="支出分類圓餅圖"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>每月支出趨勢</h3>
      <div style="position:relative;height:220px"><canvas id="spendChart" role="img" aria-label="每月支出趨勢折線圖"></canvas></div>
    </div>
  </div>

  <div class="section-title">交易明細</div>
  <div class="table-card">
    <h3 style="display:flex;align-items:center;justify-content:space-between">
      <span>信用卡交易明細</span>
      <span id="txCount" style="font-size:12px;color:#aaa;font-weight:400"></span>
    </h3>
    <div style="padding:12px 20px 0">
      <div class="tx-filter-row">
        <select id="txMonthSelect"></select>
        <select id="txCatSelect"><option value="">全部分類</option></select>
        <input id="txSearch" placeholder="搜尋摘要..." />
      </div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>日期</th><th>銀行</th><th>摘要</th>
          <th class="text-right">金額</th><th>分類</th>

    <div class="tx-pagination">
      <button id="txPrev" onclick="txChangePage(-1)">← 上一頁</button>
      <span id="txPageInfo"></span>
      <button id="txNext" onclick="txChangePage(1)">下一頁 →</button>
    </div>
  </div>

  <!-- 編輯視窗 -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>✏️ 編輯交易</h3>
      <div class="modal-field">
        <label>摘要</label>
        <input type="text" id="editDesc" />
      </div>

        <label>金額</label>

      </div>
      <div class="modal-field">
        <label>分類</label>
        <select id="editCat">
          <option>餐飲</option><option>交通</option><option>購物</option>
          <option>娛樂</option><option>日用品</option>
          <option>醫療保健</option><option>訂閱服務</option><option>繳費</option>
          <option>轉帳</option><option>保險</option><option>其他</option>
        </select>
      </div>

        <button class="btn-cancel" onclick="closeModal()">取消</button>

    </div>
  </div>

  <div class="section-title">投資明細</div>
  <div class="table-card">
    <h3>投資庫存快照</h3>
    <div style="overflow-x:auto">
      <table id="investTable">
        <thead><tr>
          <th>標的</th><th>類型</th>
          <th class="text-right">現值 (TWD)</th>
          <th class="text-right">損益</th>
          <th class="text-right">報酬率</th>

      </table>

  <div class="section-title">貸款明細</div>
  <div class="table-card">
    <h3>貸款快照</h3>

         <thead><tr>
          <th>銀行</th><th>類型</th>
          <th class="text-right">現貸餘額</th>
          <th class="text-right">本月還款</th>
          <th class="text-right">利率</th>
        </tr></thead>

      </table>

</div>

<script>

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwkX-OQWFpAf2FX7Sqyegnu3NIwfXdZL92bIiwIIXsBu6QPDZBsm6R7SKDtVIcIUKU/exec';

let allTxns = [];
let filteredTxns = [];
let txPage = 0;
const TX_PAGE_SIZE = 30;
let editingRowIndex = null;

function renderTxTable(txns) {
  allTxns = txns;
  const months = [...new Set(txns.map(r => (r['來源帳單'] || '').substring(0,7)).filter(Boolean))].sort().reverse();
  const mSel = document.getElementById('txMonthSelect');
  mSel.innerHTML = '<option value="">全部月份</option>' + months.map(m => `<option value="${m}">${m}</option>`).join('');
  const cats = [...new Set(txns.map(r => r['分類']).filter(Boolean))].sort();
  const cSel = document.getElementById('txCatSelect');
  cSel.innerHTML = '<option value="">全部分類</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
  mSel.addEventListener('change', applyTxFilter);
  cSel.addEventListener('change', applyTxFilter);
  document.getElementById('txSearch').addEventListener('input', applyTxFilter);
  applyTxFilter();
}

function applyTxFilter() {
  const month = document.getElementById('txMonthSelect').value;
  const cat = document.getElementById('txCatSelect').value;
  const search = document.getElementById('txSearch').value.toLowerCase();
  filteredTxns = allTxns.filter(r => {
    const ym = (r['來源帳單'] || '').substring(0,7);
    if (month && ym !== month) return false;
    if (cat && r['分類'] !== cat) return false;
    if (search && !(r['摘要'] || '').toLowerCase().includes(search)) return false;
    return true;
  });
  txPage = 0;
  renderTxPage();
}

function renderTxPage() {
  const start = txPage * TX_PAGE_SIZE;
  const end = start + TX_PAGE_SIZE;
  const page = filteredTxns.slice(start, end);
  const total = filteredTxns.length;
  document.getElementById('txCount').textContent = `共 ${total} 筆`;
  document.getElementById('txPageInfo').textContent = total > 0 ? `第 ${start+1}-${Math.min(end,total)} 筆` : '無資料';
  document.getElementById('txPrev').disabled = txPage === 0;
  document.getElementById('txNext').disabled = end >= total;
  document.getElementById('txBody').innerHTML = page.map(r => {
    const rowIndex = allTxns.indexOf(r) + 2;
    const amt = r['金額'] || 0;
    const cat = r['分類'] || '';
    const descEsc = (r['摘要']||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const catEsc = cat.replace(/'/g,"\\'");
    return `<tr class="clickable" onclick="openEdit(${rowIndex}, '${descEsc}', ${amt}, '${catEsc}')">
      <td>${r['日期'] || '-'}</td>
      <td>${r['銀行'] || '-'}</td>
      <td>${r['摘要'] || '-'}</td>
      <td class="text-right ${amt < 0 ? 'negative' : 'positive'}">${fmt(amt)}</td>
      <td><span class="cat-badge">${cat || '未分類'}</span></td>
    </tr>`;
  }).join('');
}

function txChangePage(dir) {
  txPage += dir;
  renderTxPage();
}

function openEdit(rowIndex, desc, amt, cat) {
  editingRowIndex = rowIndex;
  document.getElementById('editDesc').value = desc;
  document.getElementById('editAmt').value = amt;
  document.getElementById('editCat').value = cat || '其他';
  document.getElementById('modalMsg').textContent = '';
  document.getElementById('modalMsg').className = 'modal-msg';
  document.getElementById('btnSave').disabled = false;
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  editingRowIndex = null;
}

async function saveEdit() {
  const desc = document.getElementById('editDesc').value;
  const amt = parseFloat(document.getElementById('editAmt').value);
  const cat = document.getElementById('editCat').value;
  const btn = document.getElementById('btnSave');
  const msg = document.getElementById('modalMsg');
  btn.disabled = true;
  msg.textContent = '儲存中...';
  msg.className = 'modal-msg';
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateTransaction', rowIndex: editingRowIndex, 摘要: desc, 金額: amt, 分類: cat })
    });
    const data = await res.json();
    if (data.success) {
      msg.textContent = '✓ 儲存成功';
      msg.className = 'modal-msg success';
      const r = allTxns[editingRowIndex - 2];
      if (r) { r['摘要'] = desc; r['金額'] = amt; r['分類'] = cat; }
      renderTxPage();
      setTimeout(closeModal, 800);
    } else {
      throw new Error(data.error || '儲存失敗');
    }
  } catch(e) {
    msg.textContent = '❌ ' + e.message;
    msg.className = 'modal-msg error';
    btn.disabled = false;
  }
}

window.addEventListener('click', function(e) {
  const modal = document.getElementById('editModal');
  if (modal && e.target === modal) closeModal();
});

const SHEET_ID = '1-_xWxMsiCgpeNe_82anV4GFgW8SHt--Rwljeu7N5nfk';
const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;

const COLORS = {
  deposit: '#378ADD',
  invest:  '#1D9E75',
  ccDebt:  '#D85A30',
  loan:    '#D4537E',
  net:     '#534AB7',
};

const CAT_COLORS = ['#378ADD','#1D9E75','#D85A30','#534AB7','#D4537E','#BA7517','#639922','#A32D2D','#185FA5','#0F6E56'];

function fmt(n, digits=0) {
  if (n == null || isNaN(n)) return '-';
  return new Intl.NumberFormat('zh-TW', { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(n);
}
function fmtSign(n) {
  if (n == null || isNaN(n)) return '-';
  const s = fmt(Math.abs(n));
  return (n >= 0 ? '+' : '-') + s;
}

async function fetchSheet(name, hasHeader=true) {
  const url = BASE + encodeURIComponent(name) + (hasHeader ? '&headers=1' : '');
  const res = await fetch(url);
  const text = await res.text();
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!match) throw new Error(`fetchSheet(${name}): 無法解析回應`);
  let json;
  try { json = JSON.parse(match[1]); } catch(e) { return []; }
  if (!json.table || !json.table.cols) return [];
  const cols = json.table.cols.map(c => c.label);
  const rows = (json.table.rows || []).map(r =>
    Object.fromEntries(cols.map((c, i) => [c, r.c?.[i]?.v ?? null]))
  );
  return rows;
}

let catChartInst = null;

async function init() {
  try {
    // ✅ 加入「投資即時」分頁，讀取失敗不影響其他資料
    const [overview, txns, invest, loans, livePricesRaw] = await Promise.all([
      fetchSheet('月度總覽'),
      fetchSheet('信用卡交易明細'),
      fetchSheet('投資庫存快照'),
      fetchSheet('貸款快照'),
      fetchSheet('投資即時').catch(() => []),
    ]);

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';

    // 建立即時現值 map：{ '2412 中華電': { value, updatedAt } }
    const livePriceMap = {};
    let liveUpdatedAt = '';
    livePricesRaw.forEach(r => {
      const name = r['投資標的'];
      const val = r['現值'];
      const updated = r['更新時間'];
      if (name && val != null && val !== '') {
        livePriceMap[name] = { value: Number(val), updatedAt: updated || '' };
        if (!liveUpdatedAt && updated) liveUpdatedAt = updated;
      }
    });

    const latest = overview[overview.length - 1] || {};
    document.getElementById('lastUpdated').textContent = `最後更新：${latest['年月'] || '-'}`;

    // 計算即時投資總現值（有即時資料就用，否則 fallback 到月度總覽）
    const liveInvestTotal = Object.values(livePriceMap).reduce((s, v) => s + v.value, 0);
    const investTotal = liveInvestTotal > 0 ? liveInvestTotal : (latest['投資現值總額'] || 0);

    renderMetrics(latest, investTotal, liveUpdatedAt);
    renderAssetChart(overview);
    renderSpendTrend(txns);
    renderMonthFilter(txns);
    renderTxTable(txns);
    renderInvestTable(invest, livePriceMap, liveUpdatedAt);
    renderLoanTable(loans);

  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    console.error(e);
  }
}

// ✅ 加入 investTotal 和 liveUpdatedAt 參數
function renderMetrics(d, investTotal, liveUpdatedAt) {
  const net = (d['存款總額(TWD)'] || 0) + investTotal - (d['信用卡應繳總額'] || 0) - (d['貸款餘額總額'] || 0);
  const dep = d['存款總額(TWD)'] || 0;
  const cc  = d['信用卡應繳總額'] || 0;
  const loan= d['貸款餘額總額'] || 0;

  const investSub = liveUpdatedAt ? `更新 ${liveUpdatedAt}` : 'TWD';

  const items = [
    { label: '淨資產', value: fmt(net), cls: net >= 0 ? 'positive' : 'negative', sub: d['年月'] },
    { label: '存款', value: fmt(dep), cls: 'neutral', sub: 'TWD' },
    { label: '投資現值', value: fmt(investTotal), cls: 'positive', sub: investSub },
    { label: '信用卡應繳', value: fmt(cc), cls: cc > 0 ? 'negative' : 'neutral', sub: '待繳' },
    { label: '貸款餘額', value: fmt(loan), cls: 'negative', sub: '剩餘' },
  ];

  document.getElementById('metricGrid').innerHTML = items.map(i => `
    <div class="metric-card">
      <div class="label">${i.label}</div>
      <div class="value ${i.cls}">${i.value}</div>
      <div class="sub">${i.sub || ''}</div>
    </div>
  `).join('');
}

function renderAssetChart(rows) {
  const labels = rows.map(r => r['年月']);
  const deps   = rows.map(r => r['存款總額(TWD)'] || 0);
  const invs   = rows.map(r => r['投資現值總額'] || 0);
  const ccs    = rows.map(r => -(r['信用卡應繳總額'] || 0));
  const loans  = rows.map(r => -(r['貸款餘額總額'] || 0));
  const nets   = rows.map(r => r['淨資產'] || 0);

  const legend = [
    { color: COLORS.deposit, label: '存款' },
    { color: COLORS.invest,  label: '投資' },
    { color: COLORS.ccDebt,  label: '信用卡(負)' },
    { color: COLORS.loan,    label: '貸款(負)' },
    { color: COLORS.net,     label: '淨資產' },
  ];
  document.getElementById('assetLegend').innerHTML = legend.map(l =>
    `<span class="legend-item"><span class="legend-dot" style="background:${l.color}"></span>${l.label}</span>`
  ).join('');

  new Chart(document.getElementById('assetChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '存款', data: deps, backgroundColor: COLORS.deposit + 'cc', stack: 'a' },
        { label: '投資', data: invs, backgroundColor: COLORS.invest + 'cc', stack: 'a' },
        { label: '信用卡(負)', data: ccs, backgroundColor: COLORS.ccDebt + 'cc', stack: 'a' },
        { label: '貸款(負)', data: loans, backgroundColor: COLORS.loan + 'cc', stack: 'a' },
        { label: '淨資產', data: nets, type: 'line', borderColor: COLORS.net, backgroundColor: 'transparent', borderWidth: 2, pointRadius: 4, pointBackgroundColor: COLORS.net, tension: 0.3 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { stacked: true, ticks: { autoSkip: false, maxRotation: 45, font: { size: 11 } } },
        y: { stacked: true, ticks: { callback: v => fmt(v), font: { size: 11 } }, grid: { color: '#f0f0f0' } }
      }
    }
  });
}

function renderSpendTrend(txns) {
  const byMonth = {};
  txns.forEach(r => {
    const ym = (r['來源帳單'] || '').substring(0, 7);
    const amt = r['金額'] || 0;
    if (!ym || amt >= 0) return;
    const cat = r['分類'] || '';
    if (cat === '轉帳') return;  // 排除轉帳
    byMonth[ym] = (byMonth[ym] || 0) + Math.abs(amt);
  });
  const months = Object.keys(byMonth).sort();
  const vals = months.map(m => Math.round(byMonth[m]));

  new Chart(document.getElementById('spendChart'), {
    type: 'line',
    data: {
      labels: months,
      datasets: [{ label: '支出', data: vals, borderColor: '#D85A30', backgroundColor: '#D85A3015', fill: true, tension: 0.3, pointRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { autoSkip: true, maxRotation: 45, font: { size: 10 } } },
        y: { ticks: { callback: v => fmt(v), font: { size: 10 } }, grid: { color: '#f0f0f0' } }
      }
    }
  });
}

function renderMonthFilter(txns) {
  const months = [...new Set(txns.map(r => (r['來源帳單'] || '').substring(0, 7)).filter(Boolean))].sort().reverse();
  const sel = document.getElementById('monthSelect');
  sel.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
  sel.addEventListener('change', () => renderCatChart(txns, sel.value));
  if (months.length) renderCatChart(txns, months[0]);
}

function renderCatChart(txns, month) {
  const byCat = {};
  txns.forEach(r => {
    const ym = (r['來源帳單'] || '').substring(0, 7);
    if (ym !== month) return;
    const amt = r['金額'] || 0;
    if (amt >= 0) return;
    const cat = r['分類'] || '其他';
    if (cat === '轉帳') return;  // 排除轉帳
    byCat[cat] = (byCat[cat] || 0) + Math.abs(amt);
  });

  const cats = Object.keys(byCat).sort((a, b) => byCat[b] - byCat[a]);
  const vals = cats.map(c => Math.round(byCat[c]));
  const total = vals.reduce((s, v) => s + v, 0);
  const colors = cats.map((_, i) => CAT_COLORS[i % CAT_COLORS.length]);

  document.getElementById('catLegend').innerHTML = cats.map((c, i) =>
    `<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${c} ${Math.round(byCat[c]/total*100)}%</span>`
  ).join('');

  if (catChartInst) catChartInst.destroy();
  catChartInst = new Chart(document.getElementById('catChart'), {
    type: 'doughnut',
    data: { labels: cats, datasets: [{ data: vals, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${fmt(ctx.raw)} (${Math.round(ctx.raw/total*100)}%)` } }
      }
    }
  });
}
// ✅ 改用即時現值，fallback 到帳單現值
function renderInvestTable(rows, livePriceMap = {}, liveUpdatedAt = '') {
  const latest = {};
  rows.forEach(r => {
    const key = r['個股投資標的'] || r['投資類型'] || '-';
    const ym = r['年月'] || '';
    if (!latest[key] || ym > latest[key]['年月']) latest[key] = r;
  });

  // 顯示更新時間
  if (liveUpdatedAt) {
    document.getElementById('investUpdated').textContent = `股價更新：${liveUpdatedAt}`;
  }

  const body = document.getElementById('investBody');
  const items = Object.values(latest).sort((a, b) => {
    const aKey = a['個股投資標的'] || '-';
    const bKey = b['個股投資標的'] || '-';
    const aVal = livePriceMap[aKey]?.value ?? a['投資現值'] ?? 0;
    const bVal = livePriceMap[bKey]?.value ?? b['投資現值'] ?? 0;
    return bVal - aVal;
  });

  if (!items.length) {
    body.innerHTML = '<tr><td colspan="5" class="no-data">尚無資料</td></tr>';
    return;
  }
  body.innerHTML = items.map(r => {
    const key = r['個股投資標的'] || '-';
    const liveData = livePriceMap[key];
    const isLive = !!liveData;

    // 現值：即時 > 帳單
    const currentVal = isLive ? liveData.value : (r['投資現值'] || 0);

    // 損益：有即時現值就用現值-成本重算，否則用帳單損益
    const cost = r['總投資成本'] || 0;
    let pnl, rate;
    if (isLive && cost > 0) {
      pnl = currentVal - cost;
      rate = pnl / cost;
    } else {
      pnl = r['損益_含息'] ?? r['損益_不含息'] ?? 0;
      rate = parseFloat(r['報酬率_含息'] ?? r['報酬率_不含息'] ?? '0') / 100;
    }

    const typeColor = r['投資類型'] === '台股' ? 'badge-green'
                    : r['投資類型'] === '美股' ? 'badge-blue'
                    : 'badge-amber';

    return `<tr>
      <td>${key}${isLive ? '<span class="badge badge-live">即時</span>' : ''}</td>
      <td><span class="badge ${typeColor}">${r['投資類型'] || '-'}</span></td>
      <td class="text-right">${fmt(currentVal)}</td>
      <td class="text-right ${pnl >= 0 ? 'positive' : 'negative'}">${fmtSign(pnl)}</td>
      <td class="text-right ${rate >= 0 ? 'positive' : 'negative'}">${isNaN(rate) ? '-' : (rate * 100).toFixed(1) + '%'}</td>
    </tr>`;
  }).join('');
}

function renderLoanTable(rows) {
  const body = document.getElementById('loanBody');
  const latest = {};
  rows.forEach(r => {
    const key = (r['銀行'] || '') + (r['帳戶末四碼'] || '');
    const ym = r['年月'] || '';
    if (!latest[key] || ym > latest[key]['年月']) latest[key] = r;
  });
  const items = Object.values(latest).sort((a, b) => (b['現貸餘額'] || 0) - (a['現貸餘額'] || 0));
  if (!items.length) { body.innerHTML = '<tr><td colspan="5" class="no-data">尚無資料</td></tr>'; return; }

  body.innerHTML = items.map(r => `<tr>
    <td>${r['銀行'] || '-'}</td>
    <td>${r['貸款類型'] || '-'}</td>
    <td class="text-right negative">${fmt(r['現貸餘額'])}</td>
    <td class="text-right">${fmt(r['本期應還/本月還款'])}</td>
    <td class="text-right">${r['利率'] != null ? (r['利率'] * 100).toFixed(2) + '%' : '-'}</td>
  </tr>`).join('');
}

const PASSWORD_HASH = '4f85fa5b2e2dc89685fa50e10edaf3d0d578ea98e316cbf9b73364c5472c85b9';

async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword() {
  const pw = document.getElementById('pwInput').value;
  const hash = await hashPassword(pw);
  if (hash === PASSWORD_HASH) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('dashboardWrap').style.display = 'block';
    sessionStorage.setItem('auth', hash);
    init();
  } else {
    document.getElementById('pwError').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

(async () => {
  const saved = sessionStorage.getItem('auth');
  if (saved && saved === PASSWORD_HASH) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('dashboardWrap').style.display = 'block';
    init();
  }
})();
