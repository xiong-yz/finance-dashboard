<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機構管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

.lock-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f0; }
.lock-card { background: #fff; border-radius: 16px; border: 1px solid #ebebeb; padding: 40px 36px; width: 320px; text-align: center; }
.lock-card .icon { font-size: 36px; margin-bottom: 16px; }
.lock-card h2 { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
.lock-card p { font-size: 13px; color: #888; margin-bottom: 24px; }
.lock-card input { width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; text-align: center; letter-spacing: 0.1em; outline: none; margin-bottom: 12px; }
.lock-card input:focus { border-color: #888; }
.lock-card button { width: 100%; padding: 10px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
.lock-card .error { font-size: 12px; color: #d85a30; margin-top: 8px; display: none; }

.header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 18px; font-weight: 500; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.header a { font-size: 13px; color: #555; text-decoration: none; padding: 6px 12px; border: 1px solid #e0e0e0; border-radius: 6px; background: #fff; }

.content { padding: 20px; max-width: 960px; margin: 0 auto; }

.summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 24px; }
.summary-card { background: #fff; border-radius: 10px; border: 1px solid #ebebeb; padding: 14px 16px; }
.summary-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
.summary-card .value { font-size: 22px; font-weight: 500; }
.summary-card .sub { font-size: 11px; color: #aaa; margin-top: 3px; }

.filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 6px 14px; border: 1px solid #e0e0e0; border-radius: 20px; font-size: 12px; background: #fff; cursor: pointer; color: #555; transition: all 0.15s; }
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

.section-label { font-size: 11px; font-weight: 500; color: #aaa; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; margin-top: 20px; }

.institution-list { display: flex; flex-direction: column; gap: 8px; }
.inst-card { background: #fff; border-radius: 12px; border: 1px solid #ebebeb; padding: 16px 20px; }
.inst-card.manual-pending { border-left: 3px solid #D85A30; }
.inst-card.auto-ok { border-left: 3px solid #1D9E75; }
.inst-card.uncertain { border-left: 3px solid #BA7517; }

.inst-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.inst-name { font-size: 15px; font-weight: 500; }
.inst-badges { display: flex; gap: 6px; flex-wrap: wrap; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-deposit  { background: #e6f1fb; color: #185fa5; }
.badge-cc       { background: #eaf3de; color: #3b6d11; }
.badge-invest   { background: #faeeda; color: #854f0b; }
.badge-loan     { background: #faece7; color: #993c1d; }
.badge-auto     { background: #e1f5ee; color: #0f6e56; }
.badge-manual   { background: #fcebeb; color: #a32d2d; }
.badge-uncertain{ background: #f1efe8; color: #5f5e5a; }

.inst-rows { display: flex; flex-direction: column; gap: 6px; }
.inst-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #fafafa; border-radius: 8px; font-size: 13px; }
.inst-row-left { display: flex; align-items: center; gap: 8px; }
.inst-row-type { color: #555; }
.inst-row-method { font-size: 12px; color: #888; }
.inst-row-right { display: flex; align-items: center; gap: 10px; }
.inst-row-status { font-size: 12px; }
.status-done   { color: #1D9E75; }
.status-pending{ color: #D85A30; }
.status-unknown{ color: #BA7517; }

.note { font-size: 12px; color: #aaa; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; }

.month-badge { background: #f5f5f0; border: 1px solid #e5e5e5; border-radius: 4px; padding: 2px 8px; font-size: 11px; color: #666; }

@media (max-width: 600px) {
  .inst-row { flex-direction: column; align-items: flex-start; gap: 4px; }
  .inst-row-right { margin-top: 4px; }
}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-card">
    <div class="icon">🔒</div>
    <h2>機構管理</h2>
    <p>請輸入密碼</p>
    <input type="password" id="pwInput" placeholder="••••••••" autofocus />
    <button onclick="checkPassword()">進入</button>
    <div class="error" id="pwError">密碼錯誤，請再試一次</div>
  </div>
</div>

<div id="dashboardWrap" style="display:none">
<div class="header">
  <h1>🏦 機構管理</h1>
  <div class="header-actions">
    <span id="currentMonth" class="month-badge"></span>
    <a href="index.html">← 儀表板</a>
  </div>
</div>

<div class="content">

  <div class="summary-row">
    <div class="summary-card">
      <div class="label">機構總數</div>
      <div class="value" id="totalCount">-</div>
      <div class="sub">家機構</div>
    </div>
    <div class="summary-card">
      <div class="label">自動抓取</div>
      <div class="value" id="autoCount" style="color:#1D9E75">-</div>
      <div class="sub">家機構</div>
    </div>
    <div class="summary-card">
      <div class="label">需手動</div>
      <div class="value" id="manualCount" style="color:#D85A30">-</div>
      <div class="sub">項目待處理</div>
    </div>
    <div class="summary-card">
      <div class="label">待確認</div>
      <div class="value" id="uncertainCount" style="color:#BA7517">-</div>
      <div class="sub">項目</div>
    </div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
    <button class="filter-btn" onclick="setFilter('auto', this)">自動抓取</button>
    <button class="filter-btn" onclick="setFilter('manual', this)">需手動</button>
    <button class="filter-btn" onclick="setFilter('deposit', this)">存款</button>
    <button class="filter-btn" onclick="setFilter('cc', this)">信用卡</button>
    <button class="filter-btn" onclick="setFilter('invest', this)">投資</button>
    <button class="filter-btn" onclick="setFilter('loan', this)">貸款</button>
  </div>

  <div class="institution-list" id="instList"></div>

</div>

<script>
const INSTITUTIONS = [
  {
    name: '永豐銀行',
    nameEn: 'sinopac',
    items: [
      { type: '存款', typeCls: 'deposit', method: 'auto', note: '信件自動抓取' },
      { type: '信用卡', typeCls: 'cc', method: 'auto', note: '信件自動抓取' },
    ]
  },
  {
    name: '元大銀行',
    nameEn: 'yuanta',
    items: [
      { type: '存款', typeCls: 'deposit', method: 'auto', note: '信件自動抓取' },
      { type: '信用卡', typeCls: 'cc', method: 'auto', note: '信件自動抓取' },
    ]
  },
  {
    name: '第一銀行',
    nameEn: 'firstbank',
    items: [
      { type: '存款', typeCls: 'deposit', method: 'auto', note: '信件自動抓取' },
      { type: '信用卡', typeCls: 'cc', method: 'auto', note: '信件自動抓取' },
    ]
  },
  {
    name: '華南銀行',
    nameEn: 'hanan',
    items: [
      { type: '存款', typeCls: 'deposit', method: 'auto', note: '信件自動抓取' },
      { type: '信用卡', typeCls: 'cc', method: 'auto', note: '信件自動抓取' },
    ]
  },
  {
    name: '聯邦銀行',
    nameEn: 'union',
    items: [
      { type: '存款', typeCls: 'deposit', method: 'auto', note: '信件自動抓取' },
      { type: '信用卡', typeCls: 'cc', method: 'auto', note: '信件自動抓取' },
      { type: '貸款', typeCls: 'loan', method: 'auto', note: '信件自動抓取' },
    ]
  },
  {
    name: '台新銀行',
    nameEn: 'taishin',
    items: [
      { type: '存款', typeCls: 'deposit', method: 'auto', note: '信件自動抓取' },
      { type: '信用卡', typeCls: 'cc', method: 'auto', note: '信件自動抓取' },
    ]
  },
  {
    name: '台北富邦',
    nameEn: 'fubon',
    items: [
      { type: '存款', typeCls: 'deposit', method: 'auto', note: '信件自動抓取' },
      { type: '信用卡', typeCls: 'cc', method: 'manual', note: '需手動上官網下載' },
      { type: '貸款', typeCls: 'loan', method: 'auto', note: '信件自動抓取' },
    ]
  },
  {
    name: '星展銀行',
    nameEn: 'dbs',
    items: [
      { type: '信用卡', typeCls: 'cc', method: 'auto', note: '信件自動抓取' },
    ]
  },
  {
    name: '國泰世華',
    nameEn: 'cathay',
    items: [
      { type: '存款', typeCls: 'deposit', method: 'manual', note: '需手動上官網下載' },
      { type: '信用卡', typeCls: 'cc', method: 'auto', note: '信件自動抓取' },
    ]
  },
  {
    name: '連線銀行',
    nameEn: 'lianxian',
    items: [
      { type: '存款', typeCls: 'deposit', method: 'manual', note: '對帳單含存款與貸款，需手動下載' },
      { type: '貸款', typeCls: 'loan', method: 'manual', note: '對帳單含存款與貸款，需手動下載' },
    ]
  },
  {
    name: '中國信託',
    nameEn: 'ctbc',
    items: [
      { type: '信用卡', typeCls: 'cc', method: 'manual', note: '需手動上官網下載' },
    ]
  },
  {
    name: '永豐金證券',
    nameEn: 'sinotrade',
    items: [
      { type: '投資', typeCls: 'invest', method: 'auto', note: '信件自動抓取（綜合對帳單）' },
    ]
  },
  {
    name: '鉅亨網',
    nameEn: 'anue',
    items: [
      { type: '投資', typeCls: 'invest', method: 'manual', note: '需手動上官網下載或查詢' },
    ]
  },
  {
    name: '基富通',
    nameEn: 'fundrich',
    items: [
      { type: '投資', typeCls: 'invest', method: 'manual', note: '需手動上官網下載或查詢' },
    ]
  },
  {
    name: '野村投信',
    nameEn: 'nomura',
    items: [
      { type: '投資', typeCls: 'invest', method: 'uncertain', note: '待確認，帳單本月尚未收到' },
    ]
  },
];

let currentFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function methodLabel(m) {
  if (m === 'auto') return '自動';
  if (m === 'manual') return '手動';
  return '待確認';
}
function methodBadge(m) {
  if (m === 'auto') return 'badge-auto';
  if (m === 'manual') return 'badge-manual';
  return 'badge-uncertain';
}
function cardClass(inst) {
  const methods = inst.items.map(i => i.method);
  if (methods.includes('uncertain')) return 'uncertain';
  if (methods.includes('manual')) return 'manual-pending';
  return 'auto-ok';
}

function render() {
  const list = document.getElementById('instList');

  let filtered = INSTITUTIONS.filter(inst => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'auto') return inst.items.some(i => i.method === 'auto');
    if (currentFilter === 'manual') return inst.items.some(i => i.method === 'manual' || i.method === 'uncertain');
    return inst.items.some(i => i.typeCls === currentFilter);
  });

  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:#bbb;font-size:13px">沒有符合的機構</div>';
    return;
  }

  list.innerHTML = filtered.map(inst => {
    const typeCls = cardClass(inst);
    const hasManual = inst.items.some(i => i.method === 'manual');
    const hasUncertain = inst.items.some(i => i.method === 'uncertain');
    const allAuto = inst.items.every(i => i.method === 'auto');

    const mainBadge = allAuto
      ? `<span class="badge badge-auto">全自動</span>`
      : hasUncertain
      ? `<span class="badge badge-uncertain">待確認</span>`
      : `<span class="badge badge-manual">部分手動</span>`;

    const typeBadges = [...new Set(inst.items.map(i => i.typeCls))].map(t => {
      const labels = { deposit: '存款', cc: '信用卡', invest: '投資', loan: '貸款' };
      return `<span class="badge badge-${t}">${labels[t]}</span>`;
    }).join('');

    const rows = inst.items.map(item => {
      const statusIcon = item.method === 'auto' ? '✓' : item.method === 'manual' ? '!' : '?';
      const statusCls = item.method === 'auto' ? 'status-done' : item.method === 'manual' ? 'status-pending' : 'status-unknown';
      const statusText = item.method === 'auto' ? '自動' : item.method === 'manual' ? '需手動' : '待確認';
      return `
        <div class="inst-row">
          <div class="inst-row-left">
            <span class="badge badge-${item.typeCls}">${item.type}</span>
            <span class="inst-row-method">${item.note}</span>
          </div>
          <div class="inst-row-right">
            <span class="inst-row-status ${statusCls}">${statusIcon} ${statusText}</span>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="inst-card ${typeCls === 'manual-pending' ? 'manual-pending' : typeCls === 'uncertain' ? 'uncertain' : 'auto-ok'}">
        <div class="inst-header">
          <span class="inst-name">${inst.name}</span>
          <div class="inst-badges">${typeBadges} ${mainBadge}</div>
        </div>
        <div class="inst-rows">${rows}</div>
      </div>`;
  }).join('');
}

function updateSummary() {
  const total = INSTITUTIONS.length;
  const autoInst = INSTITUTIONS.filter(i => i.items.every(x => x.method === 'auto')).length;
  const manualItems = INSTITUTIONS.flatMap(i => i.items).filter(x => x.method === 'manual').length;
  const uncertainItems = INSTITUTIONS.flatMap(i => i.items).filter(x => x.method === 'uncertain').length;

  document.getElementById('totalCount').textContent = total;
  document.getElementById('autoCount').textContent = autoInst;
  document.getElementById('manualCount').textContent = manualItems;
  document.getElementById('uncertainCount').textContent = uncertainItems;
}

function updateMonth() {
  const now = new Date();
  const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('currentMonth').textContent = ym;
}

updateMonth();
updateSummary();
render();

const PASSWORD_HASH = '4f85fa5b2e2dc89685fa50e10edaf3d0d578ea98e316cbf9b73364c5472c85b9';

async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword() {
  const pw = document.getElementById('pwInput').value;
  const hash = await hashPassword(pw);
  if (hash === PASSWORD_HASH) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('dashboardWrap').style.display = 'block';
    sessionStorage.setItem('auth', hash);
  } else {
    document.getElementById('pwError').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

(async () => {
  const saved = sessionStorage.getItem('auth');
  if (saved && saved === PASSWORD_HASH) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('dashboardWrap').style.display = 'block';
  }
})();
</script>
</div>
</body>
</html>
